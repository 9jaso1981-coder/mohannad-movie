<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohannad Movie — أفلام الملكية العامة</title>
<style>
  :root{
    --bg:#0b0c10;
    --panel:#15171d;
    --panel-2:#1d2028;
    --marquee:#e8b84b;
    --marquee-dim:#8a6a1f;
    --text:#f1ede4;
    --text-dim:#9a9a9a;
    --accent:#c1443a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Segoe UI', Tahoma, sans-serif;}
  body{padding-bottom:40px;}

  /* Marquee header */
  header{
    padding:22px 20px 18px;
    text-align:center;
    border-bottom:2px solid var(--marquee-dim);
    background:
      radial-gradient(ellipse at top, rgba(232,184,75,0.08), transparent 70%),
      var(--bg);
  }
  header h1{
    margin:0;
    font-family:Georgia, 'Times New Roman', serif;
    font-size:1.9rem;
    letter-spacing:2px;
    color:var(--marquee);
    text-shadow:0 0 18px rgba(232,184,75,0.35);
  }
  header p{
    margin:6px 0 0;
    color:var(--text-dim);
    font-size:.8rem;
    letter-spacing:1px;
  }

  /* Search */
  .search-wrap{padding:16px 16px 4px; max-width:720px; margin:0 auto;}
  .search-box{
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid #2a2d36; border-radius:10px;
    padding:10px 14px;
  }
  .search-box input{
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-size:1rem;
  }
  .search-box input::placeholder{color:#6b6b6b;}
  .search-box svg{flex-shrink:0;}

  /* Sections */
  .section{padding:22px 0 4px;}
  .section h2{
    margin:0 0 12px; padding:0 16px;
    font-size:1.05rem; font-weight:600; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .section h2::before{
    content:''; width:4px; height:16px; background:var(--marquee);
    border-radius:2px; display:inline-block;
  }
  .row{
    display:flex; gap:12px; overflow-x:auto; padding:0 16px 8px;
    scroll-snap-type:x proximity;
  }
  .row::-webkit-scrollbar{height:5px;}
  .row::-webkit-scrollbar-thumb{background:#2a2d36; border-radius:3px;}

  .card{
    flex:0 0 128px; scroll-snap-align:start; cursor:pointer;
  }
  .card .poster{
    width:128px; height:176px; border-radius:8px; overflow:hidden;
    background:var(--panel-2); position:relative;
    box-shadow:0 4px 14px rgba(0,0,0,.4);
    transition:transform .15s ease;
  }
  .card:active .poster{transform:scale(.96);}
  .card .poster img{width:100%; height:100%; object-fit:cover; display:block;}
  .card .poster .fallback{
    display:flex; align-items:center; justify-content:center; height:100%;
    color:#555; font-size:2rem;
  }
  .card .title{
    margin-top:6px; font-size:.82rem; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; color:var(--text);
  }
  .card .year{font-size:.72rem; color:var(--text-dim); margin-top:1px;}

  /* Grid (search results) */
  .grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:14px 10px;
    padding:8px 16px 20px;
  }
  .grid .card{flex:none; width:auto;}
  .grid .card .poster{width:100%; height:150px;}

  .empty, .loading{
    text-align:center; color:var(--text-dim); padding:40px 20px; font-size:.9rem;
  }
  .spinner{
    width:28px; height:28px; margin:0 auto 12px;
    border:3px solid #2a2d36; border-top-color:var(--marquee);
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Detail modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.75);
    display:none; align-items:flex-end; z-index:50;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--panel); width:100%; max-height:92vh; overflow-y:auto;
    border-radius:18px 18px 0 0; padding-bottom:24px;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-close{
    text-align:center; padding:10px 0 4px; cursor:pointer;
  }
  .modal-close span{
    display:inline-block; width:36px; height:4px; background:#3a3d46; border-radius:2px;
  }
  .modal-hero{width:100%; aspect-ratio:16/9; background:#000; position:relative;}
  .modal-hero video{width:100%; height:100%; display:block; background:#000;}
  .modal-body{padding:16px 18px;}
  .modal-body h3{margin:0 0 4px; font-size:1.25rem; font-family:Georgia, serif;}
  .modal-meta{color:var(--marquee); font-size:.8rem; margin-bottom:12px; letter-spacing:.5px;}
  .modal-desc{color:#c9c9c9; font-size:.9rem; line-height:1.6;}
  .quality-row{display:flex; gap:8px; margin:10px 0 4px; flex-wrap:wrap;}
  .qbtn{
    padding:5px 12px; border-radius:20px; border:1px solid #2a2d36;
    background:var(--panel-2); color:var(--text-dim); font-size:.78rem; cursor:pointer;
  }
  .qbtn.active{background:var(--marquee); color:#1a1305; border-color:var(--marquee); font-weight:600;}
  .status-note{font-size:.78rem; color:var(--text-dim); margin-top:6px;}

  footer{
    text-align:center; padding:26px 16px 10px; color:#555; font-size:.72rem; line-height:1.6;
  }
</style>
</head>
<body>

<header>
  <h1>MOHANNAD MOVIE</h1>
  <p>أفلام وأعمال في الملكية العامة — من أرشيف الإنترنت</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6b6b6b" stroke-width="2">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="text" placeholder="ابحث عن فيلم...">
  </div>
</div>

<div id="results" class="grid" style="display:none;"></div>
<div id="home"></div>

<footer>
  المحتوى مصدره أرشيف الإنترنت (archive.org) — أعمال في الملكية العامة أو مرخصة بشكل مفتوح.<br>
  يُرجى التحقق من ترخيص أي عمل قبل إعادة استخدامه تجاريًا.
</footer>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-close" onclick="closeModal()"><span></span></div>
    <div class="modal-hero">
      <video id="videoPlayer" controls playsinline></video>
    </div>
    <div class="modal-body">
      <h3 id="modalTitle"></h3>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="quality-row" id="qualityRow"></div>
      <div class="status-note" id="modalStatus"></div>
      <p class="modal-desc" id="modalDesc"></p>
    </div>
  </div>
</div>

<script>
const THUMB = id => `https://archive.org/services/img/${id}`;
const SEARCH_API = 'https://archive.org/advancedsearch.php';
const META_API = id => `https://archive.org/metadata/${id}`;

const COLLECTIONS = ['publicdomainmovies','feature_films','moviesandfilms'];

function buildSearchUrl(query){
  const fields = ['identifier','title','description','year','downloads']
    .map(f=>`fl[]=${f}`).join('&');
  return `${SEARCH_API}?q=${encodeURIComponent(query)}&${fields}&rows=24&page=1&output=json`;
}

async function fetchDiscover(){
  const collClause = `collection:(${COLLECTIONS.join(' OR ')})`;
  const q = `${collClause} AND mediatype:movies AND year:[1900 TO 2026]`;
  const url = `${buildSearchUrl(q)}&sort[]=downloads+desc`;
  const res = await fetch(url);
  const data = await res.json();
  return (data.response && data.response.docs) || [];
}

async function fetchByYearRange(minYear, maxYear){
  const collClause = `collection:(${COLLECTIONS.join(' OR ')})`;
  const q = `${collClause} AND mediatype:movies AND year:[${minYear} TO ${maxYear}]`;
  const url = `${buildSearchUrl(q)}&sort[]=downloads+desc`;
  const res = await fetch(url);
  const data = await res.json();
  return (data.response && data.response.docs) || [];
}

async function searchMovies(query){
  const q = `title:(${query}) AND mediatype:movies`;
  const url = buildSearchUrl(q);
  const res = await fetch(url);
  const data = await res.json();
  return (data.response && data.response.docs) || [];
}

function cardHtml(doc){
  const title = doc.title || 'Untitled';
  const year = doc.year || '';
  return `
    <div class="card" onclick="openDetail('${doc.identifier}')">
      <div class="poster">
        <img src="${THUMB(doc.identifier)}" loading="lazy"
             onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fallback',innerText:'🎬'}))">
      </div>
      <div class="title">${title}</div>
      ${year ? `<div class="year">${year}</div>` : ''}
    </div>`;
}

function rowSection(title, docs){
  if(!docs.length) return '';
  return `
    <div class="section">
      <h2>${title}</h2>
      <div class="row">${docs.map(cardHtml).join('')}</div>
    </div>`;
}

async function loadHome(){
  const home = document.getElementById('home');
  home.innerHTML = `<div class="loading"><div class="spinner"></div>جارٍ التحميل…</div>`;
  try{
    const [popular, classics] = await Promise.all([
      fetchDiscover(),
      fetchByYearRange(1900, 1979)
    ]);
    home.innerHTML =
      rowSection('الأكثر مشاهدة', popular) +
      rowSection('كلاسيكيات (قبل 1980)', classics) +
      rowSection('كل الأعمال', popular);
    if(!popular.length && !classics.length){
      home.innerHTML = `<div class="empty">تعذر تحميل الأعمال حاليًا. تحقق من اتصالك بالإنترنت.</div>`;
    }
  }catch(e){
    home.innerHTML = `<div class="empty">حدث خطأ أثناء التحميل: ${e.message}</div>`;
  }
}

let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', (e)=>{
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  const resultsEl = document.getElementById('results');
  const home = document.getElementById('home');
  if(!q){
    resultsEl.style.display='none';
    home.style.display='block';
    return;
  }
  home.style.display='none';
  resultsEl.style.display='grid';
  resultsEl.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="spinner"></div>جارٍ البحث…</div>`;
  searchTimer = setTimeout(async ()=>{
    const docs = await searchMovies(q);
    if(!docs.length){
      resultsEl.innerHTML = `<div class="empty" style="grid-column:1/-1">لا توجد نتائج.</div>`;
    }else{
      resultsEl.innerHTML = docs.map(cardHtml).join('');
    }
  }, 400);
});

function qualityLabel(format, height){
  const h = parseInt(height);
  if(h){
    if(h>=1080) return '1080p';
    if(h>=720) return '720p';
    if(h>=480) return '480p';
    return 'SD';
  }
  const f = (format||'').toLowerCase();
  if(f.includes('512kb')) return '480p';
  if(f.includes('h.264')||f.includes('mpeg4')) return '720p';
  if(f.includes('ogv')||f.includes('ogg')) return 'SD';
  return 'Auto';
}
function qualityRank(label){
  return {'1080p':3,'720p':2,'480p':1}[label] || 0;
}

async function openDetail(identifier){
  const backdrop = document.getElementById('modalBackdrop');
  const video = document.getElementById('videoPlayer');
  const title = document.getElementById('modalTitle');
  const meta = document.getElementById('modalMeta');
  const desc = document.getElementById('modalDesc');
  const qRow = document.getElementById('qualityRow');
  const status = document.getElementById('modalStatus');

  backdrop.classList.add('open');
  video.pause(); video.removeAttribute('src'); video.load();
  title.textContent = 'جارٍ التحميل…';
  meta.textContent = ''; desc.textContent = ''; qRow.innerHTML=''; status.textContent='';

  try{
    const res = await fetch(META_API(identifier));
    const data = await res.json();
    const md = data.metadata || {};
    title.textContent = md.title || identifier;
    meta.textContent = (md.year ? md.year + ' · ' : '') + 'الملكية العامة — Internet Archive';
    desc.textContent = (md.description || '').toString().replace(/<[^>]+>/g,'') || 'لا يوجد وصف متاح.';

    const files = data.files || [];
    const server = data.server || data.d1;
    const dir = data.dir;
    const sources = [];
    for(const f of files){
      const name = f.name || '';
      const isVideo = /\.(mp4|ogv|m4v|webm)$/i.test(name);
      if(!isVideo || !server || !dir) continue;
      const url = `https://${server}${dir}/${encodeURIComponent(name)}`;
      const label = qualityLabel(f.format, f.height);
      sources.push({label, url, format:f.format});
    }
    // de-dup by label, sort desc
    const seen = new Set(); const unique = [];
    for(const s of sources){ if(!seen.has(s.label)){ seen.add(s.label); unique.push(s);} }
    unique.sort((a,b)=>qualityRank(b.label)-qualityRank(a.label));

    if(!unique.length){
      status.textContent = 'لا يوجد ملف فيديو قابل للتشغيل لهذا العنوان.';
      return;
    }

    const preferred = unique.find(s=>s.label==='720p') || unique[0];
    playSource(preferred);

    qRow.innerHTML = unique.map(s=>
      `<button class="qbtn ${s===preferred?'active':''}" data-url="${s.url}">${s.label}</button>`
    ).join('');
    qRow.querySelectorAll('.qbtn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        qRow.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const time = video.currentTime;
        playSource({url: btn.dataset.url}, time);
      });
    });
  }catch(e){
    title.textContent = 'تعذر تحميل التفاصيل';
    status.textContent = e.message;
  }
}

function playSource(source, resumeAt){
  const video = document.getElementById('videoPlayer');
  video.src = source.url;
  video.load();
  if(resumeAt){
    video.addEventListener('loadedmetadata', function once(){
      video.currentTime = resumeAt;
      video.removeEventListener('loadedmetadata', once);
    });
  }
  video.play().catch(()=>{});
}

function closeModal(){
  const backdrop = document.getElementById('modalBackdrop');
  const video = document.getElementById('videoPlayer');
  video.pause();
  backdrop.classList.remove('open');
}
document.getElementById('modalBackdrop').addEventListener('click', (e)=>{
  if(e.target.id === 'modalBackdrop') closeModal();
});

loadHome();
</script>
</body>
</html>
